<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Gainsbook{% endblock %}</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #f7f7f8;
        color: #202124;
      }

      main {
        max-width: 640px;
        margin: 0 auto;
        padding: 1rem;
      }

      h1 {
        margin: 0 0 0.25rem;
        font-size: 1.25rem;
        font-weight: 600;
      }

      h2 {
        margin: 1.5rem 0 0.5rem;
        font-size: 1rem;
        font-weight: 600;
        color: #3c4043;
      }

      .sub {
        margin: 0 0 1.25rem;
        color: #5f6368;
        font-size: 0.9rem;
      }

      nav {
        display: flex;
        gap: 1rem;
        margin-bottom: 1.25rem;
        border-bottom: 1px solid #dadce0;
        padding-bottom: 0.75rem;
      }

      nav a {
        font-size: 0.85rem;
        color: #1a73e8;
        text-decoration: none;
        font-weight: 500;
      }

      nav a:hover {
        text-decoration: underline;
      }

      .card {
        background: #fff;
        border: 1px solid #dadce0;
        border-radius: 0.75rem;
        padding: 0.9rem 1rem;
        margin-bottom: 0.6rem;
      }

      .card-title {
        font-weight: 600;
        margin-bottom: 0.4rem;
      }

      label {
        font-size: 0.88rem;
        color: #3c4043;
        display: block;
        margin-bottom: 0.25rem;
      }

      input[type="text"],
      textarea,
      select {
        width: 100%;
        border: 1px solid #dadce0;
        border-radius: 0.5rem;
        padding: 0.55rem 0.75rem;
        font-size: 0.95rem;
        font-family: inherit;
        background: #fff;
        color: #202124;
      }

      input[type="text"]:focus,
      textarea:focus,
      select:focus {
        outline: 2px solid #1a73e8;
        outline-offset: -1px;
        border-color: transparent;
      }

      textarea {
        resize: vertical;
        min-height: 3.5rem;
        line-height: 1.45;
      }

      .row {
        display: flex;
        gap: 0.5rem;
        align-items: center;
      }

      .row input,
      .row select {
        flex: 1;
        min-width: 0;
      }

      .btn {
        border: 0;
        border-radius: 999px;
        padding: 0.5rem 1rem;
        font-weight: 600;
        font-size: 0.85rem;
        cursor: pointer;
        white-space: nowrap;
        font-family: inherit;
      }

      .btn-primary {
        background: #1a73e8;
        color: #fff;
      }

      .btn-primary:hover {
        background: #1558b0;
      }

      .btn-start {
        background: #188038;
        color: #fff;
        margin-top: 0.6rem;
      }

      .btn-start:hover {
        background: #0f5323;
      }

      .btn-sm {
        padding: 0.3rem 0.7rem;
        font-size: 0.8rem;
      }

      .btn-muted {
        background: #e8f0fe;
        color: #1a73e8;
      }

      .btn-danger {
        background: #fce8e6;
        color: #c5221f;
      }

      .btn-danger:hover {
        background: #f5c6c2;
      }

      .btn-icon {
        border: 0;
        background: none;
        cursor: pointer;
        font-size: 1rem;
        padding: 0.2rem 0.4rem;
        color: #5f6368;
        border-radius: 0.3rem;
        line-height: 1;
        font-family: inherit;
      }

      .btn-icon:hover {
        background: #f1f3f4;
      }

      .message {
        font-size: 0.85rem;
        color: #188038;
        min-height: 1.2rem;
        margin: 0.5rem 0 0;
      }

      .last-session {
        font-size: 0.82rem;
        color: #5f6368;
        margin: 0.2rem 0 0.6rem;
        line-height: 1.4;
      }

      .last-reps {
        font-weight: 600;
        color: #3c4043;
      }

      .tag-list {
        display: flex;
        flex-wrap: wrap;
        gap: 0.3rem;
        margin-top: 0.3rem;
      }

      .tag {
        font-size: 0.75rem;
        background: #e8f0fe;
        color: #1a73e8;
        border-radius: 999px;
        padding: 0.15rem 0.6rem;
      }

      .empty-state {
        font-size: 0.9rem;
        color: #5f6368;
        margin: 0.5rem 0;
      }

      .exercise-row {
        display: flex;
        align-items: center;
        gap: 0.35rem;
        padding: 0.3rem 0;
        border-bottom: 1px solid #f1f3f4;
      }

      .exercise-row:last-of-type {
        border-bottom: none;
      }

      .exercise-row-name {
        flex: 1;
        font-size: 0.9rem;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .add-exercise-row {
        margin-top: 0.75rem;
        padding-top: 0.6rem;
        border-top: 1px solid #f1f3f4;
      }
    </style>
  </head>
  <body>
    <main>
      <nav>
        <a href="{{ url_for('index') }}">Home</a>
        <a href="{{ url_for('exercises') }}">Exercises</a>
        <a href="{{ url_for('routines') }}">Routines</a>
      </nav>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
